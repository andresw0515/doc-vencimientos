services:
  # ── Backend FastAPI ─────────────────────────────────
  - type: web
    name: doc-vencimientos-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doc-vencimientos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false          # Lo ingresas manualmente en el dashboard de Render
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Doc Vencimientos
      - key: ENVIRONMENT
        value: production
      - key: APP_URL
        sync: false          # URL del frontend una vez desplegado

  # ── Frontend Vite/React ──────────────────────────────
  - type: web
    name: doc-vencimientos-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Ej: https://doc-vencimientos-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Base de Datos PostgreSQL ─────────────────────────
databases:
  - name: doc-vencimientos-db
    databaseName: doc_vencimientos
    user: docvence_user
    plan: free
